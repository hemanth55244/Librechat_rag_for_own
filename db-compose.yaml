version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: hemanth_rag
      POSTGRES_USER: hemanth_rag_user
      POSTGRES_PASSWORD: change_me_in_env
    volumes:
      - pgdata2:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  pgdata2:
