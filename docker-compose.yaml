services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: hemanth_rag
      POSTGRES_USER: hemanth_rag_user
      POSTGRES_PASSWORD: change_me_in_env
    volumes:
      - pgdata2:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  fastapi:
    build: .
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-500}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    env_file:
      - .env

volumes:
  pgdata2:
